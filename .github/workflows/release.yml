name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bilibili-analyzer-react/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: bilibili-analyzer-react/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: bilibili-analyzer-react
        run: npm ci

      - name: Import Code Signing Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build macOS (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: bilibili-analyzer-react

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            bilibili-analyzer-react/src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bilibili-analyzer-react/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: bilibili-analyzer-react/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: bilibili-analyzer-react
        run: npm ci

      - name: Build Windows (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: bilibili-analyzer-react

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            bilibili-analyzer-react/src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bilibili-analyzer-react/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: bilibili-analyzer-react/src-tauri -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: bilibili-analyzer-react
        run: npm ci

      - name: Build Linux (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: bilibili-analyzer-react

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            bilibili-analyzer-react/src-tauri/target/release/bundle/appimage/*.AppImage
            bilibili-analyzer-react/src-tauri/target/release/bundle/deb/*.deb

  release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p upload
          find artifacts/ -type f \( \
            -name "*.exe" -o -name "*.dmg" -o \
            -name "*.AppImage" -o -name "*.deb" \
          \) -exec cp {} upload/ \;
          echo "Files to upload:"
          ls -lh upload/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: upload/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup aliyun ossutil
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: ${{ secrets.OSS_ENDPOINT }}
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Generate download links file
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_NUM=${VERSION#v}
          OSS_BASE="https://ooakloo.oss-cn-shanghai.aliyuncs.com/releases"
          GITHUB_BASE="https://github.com/ooAKLoo/blbl_anly/releases/download/${VERSION}"
          GITHUB_RELEASE="https://github.com/ooAKLoo/blbl_anly/releases/tag/${VERSION}"

          cat > upload/download.md << EOF
          # UPulse ${VERSION} 下载链接

          ---

          ## 中国用户（国内高速下载）

          **Windows:** ${OSS_BASE}/latest/UPulse_${VERSION_NUM}_x64-setup.exe
          **macOS (Apple Silicon):** ${OSS_BASE}/latest/UPulse_${VERSION_NUM}_aarch64.dmg
          **Linux (AppImage):** ${OSS_BASE}/latest/UPulse_${VERSION_NUM}_amd64.AppImage
          **Linux (deb):** ${OSS_BASE}/latest/UPulse_${VERSION_NUM}_amd64.deb

          ---

          ## International Users (GitHub Download)

          **Windows:** ${GITHUB_BASE}/UPulse_${VERSION_NUM}_x64-setup.exe
          **macOS (Apple Silicon):** ${GITHUB_BASE}/UPulse_${VERSION_NUM}_aarch64.dmg
          **Linux (AppImage):** ${GITHUB_BASE}/UPulse_${VERSION_NUM}_amd64.AppImage
          **Linux (deb):** ${GITHUB_BASE}/UPulse_${VERSION_NUM}_amd64.deb

          ---

          **GitHub Release:** ${GITHUB_RELEASE}
          **版本 / Version:** ${VERSION}
          EOF

          sed -i 's/^          //' upload/download.md
          echo "Generated download.md:"
          cat upload/download.md

      - name: Upload to Aliyun OSS
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          ossutil cp -rf upload/ oss://${{ secrets.OSS_BUCKET }}/releases/${VERSION}/
          ossutil cp -rf upload/ oss://${{ secrets.OSS_BUCKET }}/releases/latest/
